{% extends "email/base.html" %}
{% block content %}
<h2 style="margin:0 0 12px;font-size:22px;">Codigo de verificacao</h2>
<p style="margin:0 0 12px;">Use o codigo abaixo para confirmar sua conta:</p>
<p style="margin:0 0 12px;font-size:28px;font-weight:700;letter-spacing:2px;">{{ code }}</p>
<p style="margin:0;">Expira em {{ expires_minutes|default:10 }} minutos.</p>
{% endblock %}
