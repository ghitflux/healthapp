{% extends "email/base.html" %}
{% block content %}
<h2 style="margin:0 0 12px;font-size:22px;">Redefinicao de senha</h2>
<p style="margin:0 0 12px;">Use o codigo abaixo para redefinir sua senha:</p>
<p style="margin:0 0 12px;font-size:28px;font-weight:700;letter-spacing:2px;">{{ code|default:token }}</p>
<p style="margin:0;">Validade: 30 minutos.</p>
{% endblock %}
