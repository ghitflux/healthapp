<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ subject|default:"HealthApp" }}</title>
</head>
<body style="margin:0;padding:0;background:#f5f7fb;font-family:Arial,sans-serif;color:#111827;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="background:#ffffff;border-radius:12px;overflow:hidden;">
          <tr>
            <td style="background:#0b6bcb;padding:20px 24px;color:#ffffff;font-size:20px;font-weight:700;">
              HealthApp
            </td>
          </tr>
          <tr>
            <td style="padding:24px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:16px 24px;background:#f3f4f6;color:#6b7280;font-size:12px;">
              Mensagem transacional automatica. Para suporte: suporte@healthapp.com.br
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
