name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: healthapp_test
          POSTGRES_USER: healthapp
          POSTGRES_PASSWORD: healthapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      POSTGRES_DB: healthapp_test
      POSTGRES_USER: healthapp
      POSTGRES_PASSWORD: healthapp_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "backend/requirements/development.txt"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements/development.txt

      - name: Lint with ruff
        working-directory: backend
        run: ruff check apps/

      - name: Type check with mypy
        working-directory: backend
        run: mypy apps/ --ignore-missing-imports

      - name: Run tests
        working-directory: backend
        run: pytest --cov=apps --cov-fail-under=80 -v
