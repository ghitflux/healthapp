services:
  postgres:
    image: postgres:16-alpine
    container_name: healthapp_postgres
    environment:
      POSTGRES_DB: healthapp
      POSTGRES_USER: healthapp
      POSTGRES_PASSWORD: healthapp_dev_2024
    ports:
      - "5432:5432"
    volumes:
      - healthapp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthapp -d healthapp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: healthapp_redis
    ports:
      - "6379:6379"
    volumes:
      - healthapp_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: healthapp_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - healthapp_minio_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: healthapp_api
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      POSTGRES_DB: healthapp
      POSTGRES_USER: healthapp
      POSTGRES_PASSWORD: healthapp_dev_2024
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: healthapp_celery_worker
    command: celery -A config worker -l info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      POSTGRES_DB: healthapp
      POSTGRES_USER: healthapp
      POSTGRES_PASSWORD: healthapp_dev_2024
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: healthapp_celery_beat
    command: celery -A config beat -l info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      POSTGRES_DB: healthapp
      POSTGRES_USER: healthapp
      POSTGRES_PASSWORD: healthapp_dev_2024
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  healthapp_postgres_data:
  healthapp_redis_data:
  healthapp_minio_data:
