components:
  schemas:
    Appointment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        patient:
          type: string
          format: uuid
        patient_name:
          type: string
          readOnly: true
        doctor:
          type: string
          format: uuid
        doctor_name:
          type: string
          readOnly: true
        convenio:
          type: string
          format: uuid
        convenio_name:
          type: string
          readOnly: true
        appointment_type:
          $ref: '#/components/schemas/AppointmentTypeEnum'
        exam_type:
          type: string
          format: uuid
          nullable: true
        scheduled_date:
          type: string
          format: date
        scheduled_time:
          type: string
          format: time
        duration_minutes:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        status:
          allOf:
          - $ref: '#/components/schemas/Status308Enum'
          readOnly: true
        cancellation_reason:
          type: string
          readOnly: true
        notes:
          type: string
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        payment:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        reminder_sent:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - appointment_type
      - cancellation_reason
      - convenio
      - convenio_name
      - created_at
      - doctor
      - doctor_name
      - id
      - patient
      - patient_name
      - payment
      - reminder_sent
      - scheduled_date
      - scheduled_time
      - status
      - updated_at
