openapi: 3.0.3
info:
  title: HealthApp API
  version: 1.0.0
  description: API REST para gestão de saúde — agendamentos, pagamentos e convênios
paths:
  /api/v1/admin-panel/audit-logs/:
    get:
      operationId: listAuditLogs
      summary: List audit logs
      parameters:
      - in: query
        name: action
        schema:
          type: string
        description: create|update|delete|access
      - in: query
        name: date_from
        schema:
          type: string
        description: YYYY-MM-DD
      - in: query
        name: date_to
        schema:
          type: string
        description: YYYY-MM-DD
      - in: query
        name: model_name
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: user
        schema:
          type: string
        description: Actor user UUID
      tags:
      - owner
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLogList'
          description: ''
