          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyPhoneRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyPhoneRequest'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
