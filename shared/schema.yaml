          - $ref: '#/components/schemas/RoleEnum'
          readOnly: true
        email_verified:
          type: boolean
          readOnly: true
        phone_verified:
          type: boolean
          readOnly: true
        is_2fa_enabled:
          type: boolean
        convenio:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - email
      - email_verified
      - full_name
      - id
      - phone_verified
      - role
      - updated_at
