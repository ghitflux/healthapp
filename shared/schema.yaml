        token:
          type: string
          minLength: 6
          maxLength: 6
      required:
      - token
    VerifyEmailRequest:
      type: object
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 6
      required:
      - code
    VerifyPhoneRequest:
      type: object
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 6
      required:
      - code
