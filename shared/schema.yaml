openapi: 3.0.3
info:
  title: HealthApp API
  version: 1.0.0
  description: API REST para gestão de saúde — agendamentos, pagamentos e convênios
paths:
  /api/v1/appointments/:
    get:
      operationId: listAppointments
      summary: List user appointments
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - appointments
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAppointmentListList'
          description: ''
    post:
      operationId: createAppointment
      summary: Create appointment (with Redis lock)
      tags:
      - appointments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AppointmentCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AppointmentCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
          description: ''
  /api/v1/appointments/{id}/:
    get:
      operationId: getAppointmentById
      summary: Get appointment details
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - appointments
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
          description: ''
  /api/v1/appointments/{id}/cancel/:
    post:
      operationId: cancelAppointment
      summary: Cancel an appointment
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - appointments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelAppointmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CancelAppointmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CancelAppointmentRequest'
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
          description: ''
  /api/v1/appointments/{id}/confirm/:
    post:
      operationId: confirmAppointment
      summary: Confirm an appointment (convenio)
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - appointments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
          description: ''
  /api/v1/appointments/{id}/rate/:
    post:
      operationId: rateAppointment
      summary: Rate a completed appointment
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - appointments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RatingCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RatingCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RatingCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - bearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rating'
          description: ''
  /api/v1/auth/forgot-password/:
