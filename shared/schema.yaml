          format: email
          readOnly: true
        full_name:
          type: string
          maxLength: 255
        phone:
          type: string
          nullable: true
          maxLength: 20
        date_of_birth:
          type: string
          format: date
          nullable: true
        gender:
          oneOf:
          - $ref: '#/components/schemas/GenderEnum'
          - $ref: '#/components/schemas/BlankEnum'
        avatar_url:
          type: string
          format: uri
          maxLength: 200
        role:
